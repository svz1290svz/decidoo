name: Backend CI

on:
  pull_request:
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: postgresql://decidoo:decidoo@localhost:5432/decidoo?schema=public
      JWT_ACCESS_SECRET: ci-access-secret-with-at-least-32-characters
      JWT_REFRESH_SECRET: ci-refresh-secret-with-at-least-32-characters
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: npm install --package-lock-only
      - run: npm ci
      - run: npm run prisma:generate
      - name: TypeScript diagnostics
        id: typecheck
        continue-on-error: true
        run: npm run typecheck 2>&1 | tee typecheck.log
      - name: Upload TypeScript diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-typecheck-diagnostics
          path: backend/typecheck.log
          retention-days: 7
      - name: Enforce typecheck
        if: steps.typecheck.outcome == 'failure'
        run: exit 1
      - name: Run backend security tests
        run: npm test
      - run: npm run build
