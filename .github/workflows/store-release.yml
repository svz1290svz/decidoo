name: Store Release Readiness

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - "lib/**"
      - "test/**"
      - "pubspec.yaml"
      - ".github/workflows/store-release.yml"
      - "tool/**"
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: store-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Generate native projects
        run: flutter create --platforms=android,ios --org com.decidoo .
      - run: flutter pub get
      - name: Release preflight
        run: bash tool/release_preflight.sh
      - name: Normalize Dart sources
        run: dart format lib test
      - run: flutter analyze
      - run: flutter test --coverage

  android:
    name: Android release bundle
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Generate Android project
        run: flutter create --platforms=android --org com.decidoo .
      - run: flutter pub get
      - name: Build release AAB
        run: flutter build appbundle --release --build-name=1.0.0 --build-number=1
      - name: Build universal release APK
        run: flutter build apk --release --build-name=1.0.0 --build-number=1
      - uses: actions/upload-artifact@v4
        with:
          name: decidoo-android-release-candidate
          path: |
            build/app/outputs/bundle/release/app-release.aab
            build/app/outputs/flutter-apk/app-release.apk
          retention-days: 14

  ios:
    name: iOS unsigned release validation
    needs: quality
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Generate iOS project
        run: flutter create --platforms=ios --org com.decidoo .
      - run: flutter pub get
      - name: Build iOS release without signing
        run: flutter build ios --release --no-codesign --build-name=1.0.0 --build-number=1
      - name: Archive unsigned app bundle
        run: ditto -c -k --sequesterRsrc --keepParent build/ios/iphoneos/Runner.app decidoo-ios-unsigned.zip
      - uses: actions/upload-artifact@v4
        with:
          name: decidoo-ios-unsigned-release-candidate
          path: decidoo-ios-unsigned.zip
          retention-days: 14
