name: Store Release Readiness

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - "lib/**"
      - "test/**"
      - "pubspec.yaml"
      - ".github/workflows/store-release.yml"
      - "tool/**"
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: store-release-${{ github.ref }}
  cancel-in-progress: true

env:
  PRODUCTION_API_BASE_URL: ${{ vars.PRODUCTION_API_BASE_URL }}
  ERROR_REPORT_URL: ${{ vars.ERROR_REPORT_URL }}

jobs:
  quality:
    name: Quality gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Generate native projects and permissions
        run: bash tool/prepare_mobile_platforms.sh
      - run: flutter pub get
      - name: Release preflight
        run: bash tool/release_preflight.sh
      - name: Validate tagged production configuration
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          [[ "$PRODUCTION_API_BASE_URL" =~ ^https:// ]] || {
            echo "::error::Repository variable PRODUCTION_API_BASE_URL must be a valid HTTPS URL for tagged releases"
            exit 1
          }
      - name: Normalize Dart sources
        run: dart format lib test
      - run: flutter analyze
      - run: flutter test --coverage

  android:
    name: Android release bundle
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Generate Android project and permissions
        run: bash tool/prepare_mobile_platforms.sh
      - run: flutter pub get
      - name: Resolve build configuration
        run: |
          VERSION_LINE=$(awk '/^version:/{print $2}' pubspec.yaml)
          echo "BUILD_NAME=${VERSION_LINE%%+*}" >> "$GITHUB_ENV"
          echo "BUILD_NUMBER=${VERSION_LINE##*+}" >> "$GITHUB_ENV"
          echo "API_BASE_URL=${PRODUCTION_API_BASE_URL:-https://api.decidoo.invalid}" >> "$GITHUB_ENV"
      - name: Build release AAB
        run: >-
          flutter build appbundle --release
          --build-name="$BUILD_NAME"
          --build-number="$BUILD_NUMBER"
          --dart-define=API_BASE_URL="$API_BASE_URL"
          --dart-define=ERROR_REPORT_URL="$ERROR_REPORT_URL"
      - name: Build universal release APK
        run: >-
          flutter build apk --release
          --build-name="$BUILD_NAME"
          --build-number="$BUILD_NUMBER"
          --dart-define=API_BASE_URL="$API_BASE_URL"
          --dart-define=ERROR_REPORT_URL="$ERROR_REPORT_URL"
      - uses: actions/upload-artifact@v7
        with:
          name: decidoo-android-release-candidate
          path: |
            build/app/outputs/bundle/release/app-release.aab
            build/app/outputs/flutter-apk/app-release.apk
          retention-days: 14

  ios:
    name: iOS unsigned release validation
    needs: quality
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Generate iOS project and permissions
        run: bash tool/prepare_mobile_platforms.sh
      - run: flutter pub get
      - name: Resolve build configuration
        run: |
          VERSION_LINE=$(awk '/^version:/{print $2}' pubspec.yaml)
          echo "BUILD_NAME=${VERSION_LINE%%+*}" >> "$GITHUB_ENV"
          echo "BUILD_NUMBER=${VERSION_LINE##*+}" >> "$GITHUB_ENV"
          echo "API_BASE_URL=${PRODUCTION_API_BASE_URL:-https://api.decidoo.invalid}" >> "$GITHUB_ENV"
      - name: Build iOS release without signing
        run: |
          set -o pipefail
          flutter build ios --release --no-codesign \
            --build-name="$BUILD_NAME" \
            --build-number="$BUILD_NUMBER" \
            --dart-define=API_BASE_URL="$API_BASE_URL" \
            --dart-define=ERROR_REPORT_URL="$ERROR_REPORT_URL" \
            2>&1 | tee ios-build.log
      - name: Upload iOS build diagnostics
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: ios-build-diagnostics
          path: ios-build.log
          retention-days: 7
      - name: Archive unsigned app bundle
        run: ditto -c -k --sequesterRsrc --keepParent build/ios/iphoneos/Runner.app decidoo-ios-unsigned.zip
      - uses: actions/upload-artifact@v7
        with:
          name: decidoo-ios-unsigned-release-candidate
          path: decidoo-ios-unsigned.zip
          retention-days: 14
