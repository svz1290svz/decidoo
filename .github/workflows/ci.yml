name: Flutter CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Generate mobile platforms
        run: flutter create --platforms=android,ios --org com.decidoo .
      - run: flutter pub get
      - name: Format sources
        run: dart format lib test
      - name: Static analysis diagnostics
        continue-on-error: true
        run: flutter analyze 2>&1 | tee analyze.txt
      - run: flutter test --coverage
      - name: Build Android APK
        run: flutter build apk --debug
      - name: Upload analyzer diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: analyzer-diagnostics
          path: analyze.txt
          retention-days: 7
      - uses: actions/upload-artifact@v4
        with:
          name: decidoo-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7
