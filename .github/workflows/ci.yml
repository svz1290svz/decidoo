name: Flutter CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Generate mobile platforms and permissions
        run: bash tool/prepare_mobile_platforms.sh
      - run: flutter pub get
      - name: Format sources
        run: dart format lib test
      - name: Static analysis
        id: analyze
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          flutter analyze 2>&1 | tee analyze.txt
      - name: Upload analyzer diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: analyzer-diagnostics
          path: analyze.txt
          retention-days: 7
      - name: Enforce analyzer result
        if: steps.analyze.outcome == 'failure'
        run: exit 1
      - name: Run Flutter tests
        id: tests
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          flutter test --coverage 2>&1 | tee test-output.txt
      - name: Upload test diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-diagnostics
          path: test-output.txt
          retention-days: 7
      - name: Enforce test result
        if: steps.tests.outcome == 'failure'
        run: exit 1
      - name: Build Android APK
        run: flutter build apk --debug
      - uses: actions/upload-artifact@v4
        with:
          name: decidoo-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7
