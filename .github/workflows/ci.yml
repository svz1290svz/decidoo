name: Flutter CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Generate mobile platforms
        run: flutter create --platforms=android,ios --org com.decidoo .
      - run: flutter pub get
      - run: dart format --output=none --set-exit-if-changed lib test
      - run: flutter analyze
      - run: flutter test --coverage
      - name: Build Android APK
        run: flutter build apk --debug
      - uses: actions/upload-artifact@v4
        with:
          name: decidoo-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7
